<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Beyond 7 Cafe cinematic walkthrough experience."
    />
    <title>Beyond 7 Cafe | Enter The Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="entry-loader">
      <span></span>
      <p>Preparing Beyond 7</p>
    </div>

    <section class="hero" id="hero">
      <div class="hero-bg"></div>
      <div class="hero-plants"></div>
      <div class="overlay"></div>
      <div class="light-rays"></div>

      <div class="door-wrap" aria-hidden="true">
        <div class="door-shadow"></div>
        <div class="door-panel"></div>
      </div>

      <div class="hero-content">
        <h1>Beyond 7 Cafe</h1>
        <p class="intro-line">Step Into Experience</p>
        <p class="next-line">Crafted Coffee. Timeless Ambience.</p>
      </div>
    </section>

    <section class="transition" id="transition">
      <div class="fade-black"></div>
    </section>

    <section class="world" id="world">
      <canvas id="three-canvas"></canvas>
      <div class="world-ui">
        <h2>Beyond 7 Interior</h2>
        <p>W A S D to walk · Mouse to look around</p>
        <button id="enter3d">Enter Walkthrough</button>
      </div>
    </section>

    <audio id="door-audio" preload="auto">
      <source
        src="https://actions.google.com/sounds/v1/doors/wood_door_open_and_close.ogg"
        type="audio/ogg"
      />
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
